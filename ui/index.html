<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Proxy 控制面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .switch { position: relative; width: 42px; height: 24px; cursor: pointer; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; inset: 0; background: #374151; border-radius: 24px; transition: 0.2s; }
        .slider::before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s; }
        .switch input:checked + .slider { background: #10b981; }
        .switch input:checked + .slider::before { transform: translateX(18px); }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col justify-center items-center p-4 select-none">

    <div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-3xl p-7 shadow-2xl space-y-6">

        <!-- 头部 -->
        <div class="flex items-center justify-between border-b border-gray-800 pb-4">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-2xl bg-emerald-500 flex items-center justify-center shadow-lg shadow-emerald-500/20">
                    <span class="text-lg">♊</span>
                </div>
                <div>
                    <h1 class="text-base font-bold text-white">Claude Code 极速中转</h1>
                    <p class="text-[10px] text-gray-400">Gemini 3.5 本地中转桥</p>
                </div>
            </div>
        </div>

        <form id="config-form" class="space-y-4">

            <!-- Gemini Key -->
            <div class="space-y-1.5">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Gemini API Key</label>
                <div class="relative">
                    <input type="password" id="gemini-key" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-500 text-white transition duration-150" placeholder="AIzaSy...">
                    <button type="button" onclick="togglePassword('gemini-key')" class="absolute right-3 top-2.5 text-[10px] text-gray-500 hover:text-gray-300">显示</button>
                </div>
            </div>

            <!-- 代理地址 + 端口 -->
            <div class="grid grid-cols-3 gap-3">
                <div class="col-span-2 space-y-1.5">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">HTTP 代理</label>
                    <input type="text" id="http-proxy" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-500 text-white transition duration-150" placeholder="http://127.0.0.1:7890">
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">端口</label>
                    <input type="number" id="proxy-port" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-emerald-500 text-white transition duration-150" placeholder="7890">
                </div>
            </div>

            <!-- 本地中转端口 -->
            <div class="space-y-1.5">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">本地中转端口 (cc-switch 接入端口)</label>
                <input type="number" id="local-port" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-emerald-500 text-white transition duration-150" placeholder="8082">
            </div>

            <!-- 状态灯 + 启用开关 -->
            <div class="flex items-center justify-between py-2 border-t border-gray-800 pt-4">
                <div class="flex items-center space-x-3">
                    <div id="diag-dot" class="w-2.5 h-2.5 rounded-full bg-gray-700"></div>
                    <span id="diag-text" class="text-xs text-gray-400">未检测</span>
                </div>
                <div class="flex items-center space-x-3">
                    <span id="switch-label" class="text-xs text-gray-500">中转通道</span>
                    <label class="switch">
                        <input type="checkbox" id="proxy-toggle" disabled>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div id="diag-msg-box" class="hidden p-2.5 rounded-xl bg-red-950/20 border border-red-900/30 text-[10px] text-red-400 font-mono"></div>

            <!-- 操作区 -->
            <div class="flex space-x-3 pt-1">
                <button type="button" onclick="testConnection()" class="flex-1 py-2.5 rounded-xl border border-gray-700 text-xs font-semibold hover:bg-gray-800 active:bg-gray-700 transition duration-150">
                    ⚡ 测试连通
                </button>
                <button type="submit" id="save-btn" disabled class="flex-1 py-2.5 rounded-xl bg-gray-800 text-gray-400 font-bold text-xs cursor-not-allowed transition duration-150">
                    💾 保存配置
                </button>
            </div>
            <p id="save-tip" class="text-center text-[10px] text-yellow-500/80">请先点击「测试连通」验证通过后即可保存并启用</p>
        </form>
    </div>

    <div id="toast-container" class="fixed bottom-5 right-5 space-y-2 z-50"></div>

    <script>
        function togglePassword(id) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        function setStatus(color, text, detail) {
            const dot = document.getElementById('diag-dot');
            const txt = document.getElementById('diag-text');
            const sw = document.getElementById('proxy-toggle');
            const label = document.getElementById('switch-label');
            const saveBtn = document.getElementById('save-btn');
            const tip = document.getElementById('save-tip');
            const msgBox = document.getElementById('diag-msg-box');

            dot.className = `w-2.5 h-2.5 rounded-full bg-${color}-500 shadow-md shadow-${color}-500/20`;
            txt.textContent = text;
            txt.className = `text-xs text-${color}-400`;

            if (color === 'emerald') {
                sw.disabled = false;
                sw.checked = true;
                label.textContent = '已启用';
                label.className = 'text-xs text-emerald-400';
                saveBtn.disabled = false;
                saveBtn.className = "flex-1 py-2.5 rounded-xl bg-emerald-500 text-gray-900 font-bold text-xs hover:bg-emerald-600 active:bg-emerald-700 transition duration-150 shadow-lg shadow-emerald-500/10 cursor-pointer";
                tip.textContent = "配置就绪，点击保存即可生效";
                tip.className = "text-center text-[10px] text-emerald-400";
                if (detail) { msgBox.classList.remove('hidden'); msgBox.textContent = detail; }
            } else {
                sw.disabled = true;
                sw.checked = false;
                label.textContent = '已断开';
                label.className = 'text-xs text-gray-500';
                saveBtn.disabled = true;
                saveBtn.className = "flex-1 py-2.5 rounded-xl bg-gray-800 text-gray-400 font-bold text-xs cursor-not-allowed transition duration-150";
                tip.textContent = "检测未通过，请检查配置后重试";
                tip.className = "text-center text-[10px] text-red-400";
                if (detail) { msgBox.classList.remove('hidden'); msgBox.textContent = detail; }
            }
        }

        function showToast(msg, type) {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `p-3 rounded-xl border flex items-center justify-between text-xs shadow-xl transition-all duration-300 transform translate-y-2 opacity-0 max-w-sm ${type === 'error' ? 'bg-red-950 border-red-800 text-red-200' : 'bg-emerald-950 border-emerald-800 text-emerald-200'}`;
            t.innerHTML = `<span>${msg}</span><button onclick="this.parentElement.remove()" class="ml-3 opacity-60 hover:opacity-100">✕</button>`;
            c.appendChild(t);
            setTimeout(() => t.classList.remove('translate-y-2', 'opacity-0'), 10);
            setTimeout(() => t.remove(), 4000);
        }

        async function fetchConfig() {
            try {
                let d;
                if (window.pywebview?.api) d = await window.pywebview.api.get_config();
                else d = await (await fetch("/api/config")).json();
                document.getElementById('gemini-key').value = d.gemini_key || '';
                document.getElementById('http-proxy').value = d.http_proxy || '';
                document.getElementById('local-port').value = d.proxy_port || 8082;
                // Extract port from proxy URL for display
                const proxyMatch = d.http_proxy?.match(/:(\d+)$/);
                document.getElementById('proxy-port').value = proxyMatch ? proxyMatch[1] : '7890';
                if (d.proxy_enabled) setStatus('emerald', '已连通', '');
            } catch (e) {
                showToast("无法连接后台服务", "error");
            }
        }

        document.getElementById('config-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const proxyAddr = document.getElementById('http-proxy').value.trim();
            const proxyPort = document.getElementById('proxy-port').value.trim();
            const fullProxy = proxyAddr.includes('://') ? proxyAddr : (proxyAddr ? `http://${proxyAddr}:${proxyPort}` : '');
            const payload = {
                gemini_key: document.getElementById('gemini-key').value,
                anthropic_key: '',
                http_proxy: fullProxy,
                https_proxy: fullProxy,
                proxy_enabled: document.getElementById('proxy-toggle').checked,
                proxy_port: parseInt(document.getElementById('local-port').value) || 8082,
                preferred_provider: "openai",
                openai_base_url: "https://generativelanguage.googleapis.com/v1beta/openai",
                big_model: "gemini-3.5-flash",
                small_model: "gemini-3.5-flash"
            };
            try {
                if (window.pywebview?.api) {
                    const r = await window.pywebview.api.save_config(payload);
                    if (r.status === "error") throw new Error(r.message);
                } else {
                    const r = await fetch("/api/config", { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!r.ok) throw new Error('保存失败');
                }
                showToast("配置已保存生效");
            } catch (err) {
                showToast(err.message, "error");
            }
        });

        async function testConnection() {
            setStatus('yellow', '检测中...', '');
            document.getElementById('diag-msg-box').classList.add('hidden');

            const proxyAddr = document.getElementById('http-proxy').value.trim();
            const proxyPort = document.getElementById('proxy-port').value.trim();
            const fullProxy = proxyAddr.includes('://') ? proxyAddr : (proxyAddr ? `http://${proxyAddr}:${proxyPort}` : '');

            const payload = {
                gemini_key: document.getElementById('gemini-key').value,
                anthropic_key: '',
                http_proxy: fullProxy,
                https_proxy: fullProxy,
                openai_base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
            };

            try {
                let res;
                if (window.pywebview?.api) res = await window.pywebview.api.test_connection(payload);
                else res = await (await fetch("/api/config/test-connection", { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })).json();

                if (res.gemini.status === "success") {
                    setStatus('emerald', '已连通', '');
                    showToast("网络检测通过，Google API 连通正常！");
                } else {
                    setStatus('red', '连接失败', '诊断: ' + (res.gemini.message || '未知错误'));
                    showToast("连接失败，请检查配置", "error");
                }
            } catch (err) {
                setStatus('red', '检测异常', '请求错误: ' + err.message);
                showToast("检测请求异常", "error");
            }
        }

        if (window.pywebview) fetchConfig();
        else { window.addEventListener('pywebviewready', fetchConfig); setTimeout(() => { if (!window.pywebview) fetchConfig(); }, 600); }
    </script>
</body>
</html>
