<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Proxy 极简控制面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col justify-center items-center p-4 select-none">

    <!-- 极简卡片容器 -->
    <div class="w-full max-w-lg bg-gray-900 border border-gray-800 rounded-3xl p-8 shadow-2xl space-y-6">

        <!-- 头部 LOGO 与标题 -->
        <div class="flex items-center space-x-4 border-b border-gray-800 pb-5">
            <div class="w-12 h-12 rounded-2xl bg-emerald-500 flex items-center justify-center shadow-lg shadow-emerald-500/20">
                <span class="text-2xl">♊</span>
            </div>
            <div>
                <h1 class="text-lg font-bold text-white tracking-tight">Claude Code 极速中转面板</h1>
                <p class="text-xs text-gray-400">Gemini 3.5 极简高兼容本地中转桥</p>
            </div>
        </div>

        <!-- 极简配置表单 -->
        <form id="config-form" class="space-y-5">

            <!-- Gemini Key -->
            <div class="space-y-2">
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Gemini API Key (AIzaSy...)</label>
                <div class="relative">
                    <input type="password" id="gemini-key" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 text-white transition duration-150" placeholder="请输入您的 Gemini 密钥">
                    <button type="button" onclick="togglePassword('gemini-key')" class="absolute right-3 top-3.5 text-xs text-gray-500 hover:text-gray-300">显示</button>
                </div>
            </div>

            <!-- Anthropic Key (可选) -->
            <div class="space-y-2">
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Anthropic API Key (可选)</label>
                <div class="relative">
                    <input type="password" id="anthropic-key" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 text-white transition duration-150" placeholder="留空则不开启官方通道透传">
                    <button type="button" onclick="togglePassword('anthropic-key')" class="absolute right-3 top-3.5 text-xs text-gray-500 hover:text-gray-300">显示</button>
                </div>
            </div>

            <!-- 本地网络代理 -->
            <div class="space-y-2">
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">网络代理 (解决国内无法直连 Google)</label>
                <input type="text" id="http-proxy" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 text-white transition duration-150" placeholder="例如 http://127.0.0.1:7890">
            </div>

            <!-- 网络诊断联通状态卡片 -->
            <div class="grid grid-cols-2 gap-4 pt-2">
                <div class="p-3 rounded-xl bg-gray-950 border border-gray-800 flex items-center justify-between">
                    <div class="text-xs text-gray-400">Gemini 连通性</div>
                    <div id="diag-gemini-dot" class="w-2.5 h-2.5 rounded-full bg-gray-700 shadow"></div>
                </div>
                <div class="p-3 rounded-xl bg-gray-950 border border-gray-800 flex items-center justify-between">
                    <div class="text-xs text-gray-400">代理状态</div>
                    <div id="diag-proxy-dot" class="w-2.5 h-2.5 rounded-full bg-gray-700 shadow"></div>
                </div>
            </div>

            <div id="diag-msg-box" class="hidden p-3 rounded-xl bg-red-950/20 border border-red-900/30 text-[10px] text-red-400 font-mono overflow-auto max-h-24"></div>

            <!-- 操作按钮 -->
            <div class="flex flex-col space-y-3 pt-4 border-t border-gray-800">
                <button type="button" onclick="testConnection()" class="w-full py-3 rounded-xl border border-gray-700 text-sm font-semibold hover:bg-gray-800 active:bg-gray-700 transition duration-150 flex justify-center items-center">
                    ⚡ 测试网络联通性
                </button>
                <button type="submit" id="save-btn" disabled class="w-full py-3.5 rounded-xl bg-gray-800 text-gray-400 font-bold text-sm cursor-not-allowed transition duration-150 shadow-lg" title="请先测试网络联通性，绿灯通过后方可保存应用">
                    💾 保存并启用本地代理
                </button>
                <p id="save-tip" class="text-center text-[10px] text-yellow-500/80 leading-normal">
                    ⚠️ 安全提醒：请先点击上方的「测试网络联通性」，检测完全通过后才可以点击保存。
                </p>
            </div>
        </form>
    </div>

    <!-- Toast 弹窗 -->
    <div id="toast-container" class="fixed bottom-5 right-5 space-y-2 z-50"></div>

    <script>
        function togglePassword(id) {
            const el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `p-4 rounded-xl border flex items-center justify-between text-xs shadow-xl transition-all duration-300 transform translate-y-2 opacity-0 max-w-sm ${
                type === 'success' ? 'bg-emerald-950 border-emerald-800 text-emerald-200' : 'bg-red-950 border-red-800 text-red-200'
            }`;
            toast.innerHTML = `<span>${message}</span><button onclick="this.parentElement.remove()" class="ml-4 opacity-60 hover:opacity-100">✕</button>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
            setTimeout(() => toast.classList.remove('translate-y-2', 'opacity-0'), 10);
        }

        async function fetchConfig() {
            try {
                let data;
                if (window.pywebview && window.pywebview.api) {
                    data = await window.pywebview.api.get_config();
                } else {
                    const r = await fetch("/api/config");
                    data = await r.json();
                }
                document.getElementById('gemini-key').value = data.gemini_key || '';
                document.getElementById('anthropic-key').value = data.anthropic_key || '';
                document.getElementById('http-proxy').value = data.http_proxy || '';
            } catch (err) {
                console.error(err);
                showToast("无法获取初始配置，请确认代理核心后台运行正常。", "error");
            }
        }

        document.getElementById('config-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                gemini_key: document.getElementById('gemini-key').value,
                anthropic_key: document.getElementById('anthropic-key').value,
                http_proxy: document.getElementById('http-proxy').value,
                // 内部高级参数我们默认写死最佳实践，给用户极致清爽的视觉
                preferred_provider: "openai",
                openai_base_url: "https://generativelanguage.googleapis.com/v1beta/openai",
                big_model: "gemini-3.5-flash",
                small_model: "gemini-3.5-flash",
                https_proxy: document.getElementById('http-proxy').value
            };

            try {
                if (window.pywebview && window.pywebview.api) {
                    const res = await window.pywebview.api.save_config(payload);
                    if (res.status === "error") throw new Error(res.message);
                } else {
                    const r = await fetch("/api/config", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!r.ok) throw new Error('保存配置接口失败');
                }
                showToast("本地中转配置保存成功，代理已瞬间重载生效！");
                fetchConfig();
            } catch (err) {
                showToast("保存配置发生异常：" + err.message, "error");
            }
        });

        async function testConnection() {
            const dots = {
                gemini: document.getElementById('diag-gemini-dot'),
                proxy: document.getElementById('diag-proxy-dot')
            };
            const saveBtn = document.getElementById('save-btn');
            const saveTip = document.getElementById('save-tip');
            const msgBox = document.getElementById('diag-msg-box');

            // 载入状态
            dots.gemini.className = "w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse";
            dots.proxy.className = "w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse";
            msgBox.classList.add('hidden');

            const payload = {
                gemini_key: document.getElementById('gemini-key').value,
                anthropic_key: document.getElementById('anthropic-key').value,
                http_proxy: document.getElementById('http-proxy').value,
                https_proxy: document.getElementById('http-proxy').value,
                openai_base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
            };

            try {
                let res;
                if (window.pywebview && window.pywebview.api) {
                    res = await window.pywebview.api.test_connection(payload);
                } else {
                    const r = await fetch("/api/config/test-connection", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!r.ok) throw new Error("测试诊断请求异常");
                    res = await r.json();
                }

                // 处理 Gemini 诊断结果
                if (res.gemini.status === "success") {
                    dots.gemini.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-md shadow-emerald-500/20";

                    // 只有在 Gemini 连接 100% 成功的情况下才解锁保存配置按钮，保护用户不配错代理
                    saveBtn.disabled = false;
                    saveBtn.className = "w-full py-3.5 rounded-xl bg-emerald-500 text-gray-900 font-bold text-sm hover:bg-emerald-600 active:bg-emerald-700 transition duration-150 shadow-lg shadow-emerald-500/10 cursor-pointer";
                    saveBtn.title = "检测通过，可以保存";
                    saveTip.className = "text-center text-[10px] text-emerald-400 leading-normal";
                    saveTip.textContent = "🎉 检测已全部通过，可以安全点击上方按钮保存配置了！";
                } else {
                    dots.gemini.className = "w-2.5 h-2.5 rounded-full bg-red-500 shadow-md shadow-red-500/20";
                    saveBtn.disabled = true;
                    saveBtn.className = "w-full py-3.5 rounded-xl bg-gray-800 text-gray-400 font-bold text-sm cursor-not-allowed transition duration-150 shadow-lg";
                    saveTip.className = "text-center text-[10px] text-red-400 leading-normal";
                    saveTip.textContent = "❌ 诊断失败：无法连通远端服务。请先配置正确的本地网络代理。";

                    // 显示具体错误日志，供用户排查代理或者是 API Key 配错
                    msgBox.classList.remove('hidden');
                    msgBox.textContent = "诊断详情: " + (res.gemini.message || "未知连接错误，请检查代理端口");
                }

                // 代理路径指示
                if (res.proxy_status === "active") {
                    dots.proxy.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-md shadow-emerald-500/20";
                } else {
                    dots.proxy.className = "w-2.5 h-2.5 rounded-full bg-gray-600 shadow";
                }

                if (res.gemini.status === "success") {
                    showToast("网络诊断成功，本地代理通道完全畅通！");
                } else {
                    showToast("与 Google 握手连接失败，保存按钮已被锁闭。", "error");
                }

            } catch (err) {
                dots.gemini.className = "w-2.5 h-2.5 rounded-full bg-red-500 shadow";
                dots.proxy.className = "w-2.5 h-2.5 rounded-full bg-red-500 shadow";
                saveBtn.disabled = true;
                saveBtn.className = "w-full py-3.5 rounded-xl bg-gray-800 text-gray-400 font-bold text-sm cursor-not-allowed transition duration-150 shadow-lg";
                showToast("测试请求执行失败，请检查中转核心状态。", "error");
            }
        }

        // 初始化运行 (支持 pywebviewready 事件以及普通浏览器超时兜底加载)
        if (window.pywebview) {
            fetchConfig();
        } else {
            window.addEventListener('pywebviewready', fetchConfig);
            setTimeout(() => { if (!window.pywebview) fetchConfig(); }, 600);
        }
    </script>
</body>
</html>
